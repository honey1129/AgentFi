services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.prod}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    networks:
      - public
      - internal

  api:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.prod}
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --proxy-headers
      - "--forwarded-allow-ips=*"
    expose:
      - "8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - internal

  worker:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.prod}
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  scheduler:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.prod}
    command: python -m app.scheduler
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  listener:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.prod}
    command: python -m app.listeners.nft_listener
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data_prod:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - internal

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data_prod:/data
    networks:
      - internal

networks:
  public:
  internal:
    internal: true

volumes:
  caddy_data:
  caddy_config:
  mysql_data_prod:
  redis_data_prod:
